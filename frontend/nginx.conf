# Numnia frontend — nginx server config.
# - Serves the Vite SPA build with HTML5 history fallback.
# - Reverse-proxies /api and /actuator to the backend service in the
#   compose network. WebSocket upgrade headers are forwarded for
#   future multiplayer endpoints (ADR-004).

upstream numnia_backend {
    server backend:8080;
}

server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    # Security headers (NFR-SEC). CSP intentionally permissive in dev.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "no-referrer" always;

    # Container healthcheck endpoint
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }

    # API + actuator proxy
    location /api/ {
        proxy_pass         http://numnia_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    location /actuator/ {
        proxy_pass         http://numnia_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Long-cache hashed assets emitted by Vite
    location /assets/ {
        access_log off;
        expires    7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files  $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
