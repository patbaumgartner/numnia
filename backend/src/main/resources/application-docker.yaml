# Profile activated in Docker compose. Reads connection info from env vars
# so that the same image works for compose, staging and prod.

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/numnia}
    username: ${SPRING_DATASOURCE_USERNAME:numnia}
    password: ${SPRING_DATASOURCE_PASSWORD:numnia}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

server:
  port: 8080
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    ch.numnia: INFO
