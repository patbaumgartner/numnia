name: CI - Numnia Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend - JUnit + Cucumber + coverage
    runs-on: ubuntu-latest
    if: ${{ hashFiles('backend/pom.xml') != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build, unit + integration tests (Testcontainers)
        working-directory: backend
        run: ./mvnw -B verify

      - name: Enforce coverage thresholds (line ≥ 80%, branch ≥ 70%)
        working-directory: backend
        run: ./mvnw -B jacoco:check

      - name: Upload backend surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/target/surefire-reports
            backend/target/failsafe-reports
            backend/target/site/jacoco

  frontend:
    name: Frontend - Vitest + coverage + lint
    runs-on: ubuntu-latest
    if: ${{ hashFiles('frontend/package.json') != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint

      - name: Unit tests with coverage (line ≥ 70%)
        working-directory: frontend
        run: pnpm test -- --coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  e2e:
    name: E2E - Playwright + Cucumber
    runs-on: ubuntu-latest
    if: ${{ hashFiles('e2e/package.json') != '' }}
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: e2e/pnpm-lock.yaml

      - name: Install e2e deps
        working-directory: e2e
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: e2e
        run: pnpm exec playwright install --with-deps chromium

      - name: Start stack
        run: docker compose up -d --wait

      - name: Run BDD scenarios
        working-directory: e2e
        run: pnpm test:bdd

      - name: Stop stack
        if: always()
        run: docker compose down -v

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report

  docs:
    name: Docs - link & traceability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify SRS exists and is referenced
        run: |
          test -f docs/Requirements.md
          test -f docs/architecture/arc42.md
          test -f docs/use_cases.puml

      - name: Verify each UC file references at least one FR or NFR
        run: |
          set -e
          fail=0
          for f in docs/use_cases/UC-*.md; do
            if ! grep -Eq 'FR-|NFR-' "$f"; then
              echo "::error file=$f::Use case must reference at least one FR-/NFR- ID"
              fail=1
            fi
          done
          exit $fail

      - name: Markdown lint (warnings only)
        uses: DavidAnson/markdownlint-cli2-action@v16
        continue-on-error: true
        with:
          globs: '**/*.md'
