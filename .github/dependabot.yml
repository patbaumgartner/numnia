version: 2
updates:
  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      github-actions:
        patterns:
          - "*"

  # Maven (Spring Boot backend)
  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "daily"
    groups:
      spring-boot:
        patterns:
          - "org.springframework.boot:*"
          - "org.springframework:*"
      maven-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "org.springframework.boot:*"
          - "org.springframework:*"
