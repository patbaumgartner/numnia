# Numnia local orchestration (per ADR-008).
# Production stack pins live in docs/adr/ADR-001 and arc42 §2.1.

services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_DB: numnia
      POSTGRES_USER: numnia
      POSTGRES_PASSWORD: numnia
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U numnia -d numnia" ]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8.6-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # Object storage: interim MinIO pin per ADR-001.
  # Target migration: Garage or SeaweedFS before launch.
  objectstore:
    image: minio/minio:RELEASE.2025-10-15T17-29-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: numnia
      MINIO_ROOT_PASSWORD: numnia-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - object-data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  object-data:
